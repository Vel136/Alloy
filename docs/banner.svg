<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#06090f"/>
      <stop offset="50%"  stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#a0c4ff"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7eb8f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2540" stroke-width="1" opacity="0.4">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="300"  y1="0"   x2="300"  y2="400"/>
    <line x1="600"  y1="0"   x2="600"  y2="400"/>
    <line x1="900"  y1="0"   x2="900"  y2="400"/>
  </g>

  <!-- Accent line -->
  <line x1="200" y1="260" x2="1000" y2="260" stroke="#3a6fe0" stroke-width="1.5" opacity="0.5"/>

  <!-- Title -->
  <text
    x="600" y="195"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="110"
    font-weight="700"
    letter-spacing="18"
    text-anchor="middle"
    fill="url(#titleGrad)"
    filter="url(#glow)"
  >ALLOY</text>

  <!-- Tagline -->
  <text
    x="600" y="300"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="4"
    text-anchor="middle"
    fill="#6a8fc8"
    opacity="0.85"
  >Fast, allocation-free hashing for Roblox</text>
</svg>
